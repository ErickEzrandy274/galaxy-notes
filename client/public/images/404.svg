<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Stars -->
  <circle cx="50" cy="30" r="2" fill="#7C3AED" opacity="0.6"/>
  <circle cx="120" cy="60" r="1.5" fill="#7C3AED" opacity="0.4"/>
  <circle cx="200" cy="20" r="2.5" fill="#7C3AED" opacity="0.5"/>
  <circle cx="300" cy="45" r="1.5" fill="#7C3AED" opacity="0.3"/>
  <circle cx="350" cy="80" r="2" fill="#7C3AED" opacity="0.6"/>
  <circle cx="80" cy="100" r="1" fill="#7C3AED" opacity="0.5"/>
  <circle cx="370" cy="150" r="1.5" fill="#7C3AED" opacity="0.4"/>
  <circle cx="30" cy="180" r="2" fill="#7C3AED" opacity="0.3"/>
  <circle cx="160" cy="260" r="1.5" fill="#7C3AED" opacity="0.5"/>
  <circle cx="340" cy="240" r="2" fill="#7C3AED" opacity="0.4"/>
  <circle cx="250" cy="270" r="1" fill="#7C3AED" opacity="0.6"/>

  <!-- Planet -->
  <circle cx="200" cy="150" r="70" fill="#7C3AED" opacity="0.1"/>
  <circle cx="200" cy="150" r="70" stroke="#7C3AED" stroke-width="1.5" opacity="0.3"/>

  <!-- Planet ring -->
  <ellipse cx="200" cy="150" rx="110" ry="25" stroke="#7C3AED" stroke-width="1.5" opacity="0.2" transform="rotate(-15 200 150)"/>

  <!-- Crater details -->
  <circle cx="180" cy="130" r="12" fill="#7C3AED" opacity="0.08"/>
  <circle cx="215" cy="160" r="8" fill="#7C3AED" opacity="0.08"/>
  <circle cx="190" cy="170" r="6" fill="#7C3AED" opacity="0.06"/>

  <!-- Astronaut body -->
  <g transform="translate(290, 90) rotate(15)">
    <!-- Helmet -->
    <circle cx="0" cy="0" r="16" fill="#a3a3a3" stroke="#737373" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="12" fill="#262626" stroke="#525252" stroke-width="1"/>
    <!-- Visor reflection -->
    <path d="M-6,-8 Q0,-12 6,-8" stroke="#7C3AED" stroke-width="1" fill="none" opacity="0.6"/>

    <!-- Body/suit -->
    <rect x="-12" y="16" width="24" height="28" rx="8" fill="#a3a3a3" stroke="#737373" stroke-width="1.5"/>
    <!-- Suit detail -->
    <rect x="-4" y="20" width="8" height="10" rx="2" fill="#7C3AED" opacity="0.3"/>

    <!-- Left arm -->
    <path d="M-12,22 Q-28,18 -24,36" stroke="#a3a3a3" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M-12,22 Q-28,18 -24,36" stroke="#737373" stroke-width="1.5" stroke-linecap="round" fill="none"/>

    <!-- Right arm -->
    <path d="M12,22 Q28,16 30,32" stroke="#a3a3a3" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M12,22 Q28,16 30,32" stroke="#737373" stroke-width="1.5" stroke-linecap="round" fill="none"/>

    <!-- Left leg -->
    <path d="M-6,44 L-10,62" stroke="#a3a3a3" stroke-width="6" stroke-linecap="round"/>
    <path d="M-6,44 L-10,62" stroke="#737373" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Right leg -->
    <path d="M6,44 L10,62" stroke="#a3a3a3" stroke-width="6" stroke-linecap="round"/>
    <path d="M6,44 L10,62" stroke="#737373" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Backpack -->
    <rect x="-8" y="18" width="16" height="20" rx="4" fill="#737373" stroke="#525252" stroke-width="1" transform="translate(0,0)"/>

    <!-- Tether line -->
    <path d="M0,44 Q-40,80 -80,60" stroke="#7C3AED" stroke-width="1" stroke-dasharray="4 3" opacity="0.5" fill="none"/>
  </g>

  <!-- Small floating debris -->
  <rect x="100" cy="80" width="6" height="6" rx="1" fill="#7C3AED" opacity="0.15" transform="rotate(30 100 80)"/>
  <rect x="320" cy="200" width="4" height="4" rx="1" fill="#7C3AED" opacity="0.12" transform="rotate(45 320 200)"/>
</svg>
