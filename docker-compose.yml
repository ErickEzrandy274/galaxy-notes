version: '3.8'

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://server:8080
    depends_on:
      - server
    networks:
      - galaxy-net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    env_file:
      - ./server/.env
    networks:
      - galaxy-net

networks:
  galaxy-net:
    driver: bridge
